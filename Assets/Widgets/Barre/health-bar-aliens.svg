<svg id="hb-root" class="hb-alien" xmlns="http://www.w3.org/2000/svg" viewBox="90 14 530 92" width="530" height="92" role="img" aria-label="Barra di salute aliena">
  <!--
  ============================================================
  ALIEN HEALTH BAR — fazione "alieni"
  Stesse dimensioni (530x92) e STESSA API della barra umana:
  gli id delle sottoparti sono identici, quindi setHealth()
  funziona senza modifiche.

  NOTA: se le due barre vengono inserite inline nello stesso
  documento, gli id collidono — in quel caso isolale (shadow DOM,
  <img>, o rinomina con prefisso) come per qualsiasi sprite SVG.

  SOTTOPARTI (id):
    #hb-frame      membrana esterna organica
    #hb-track      sacca scura di fondo
    #hb-fill-group gruppo del riempimento -> SCALARE QUESTO via scaleX(0..1)
    #hb-fill       riempimento (plasma, gradiente)
    #hb-fill-edge  fronte luminoso del riempimento
    #hb-shimmer    impulso bioluminescente che scorre
    #hb-segments   costole chitinose (overlay)
    #hb-cells      cellule fluttuanti nel plasma
    #hb-label      etichetta "HP"
    #hb-value      testo percentuale (aggiornare da gioco)
    #hb-warning    indicatore LOW visibile solo in stato critico

  API DAL GIOCO (identica alla barra umana):
    fill.style.transform = `scaleX(${hp})`;
    #hb-value.textContent = ...;
    svg.classList.toggle('is-critical', hp <= 0.25);
  ============================================================
  -->

  <style>
    :root, #hb-root {
      --hb-primary:  #c44dff;  /* viola bioluminescente */
      --hb-fill-a:   #ff2bd6;  /* magenta plasma */
      --hb-fill-b:   #7a2bff;  /* viola profondo */
      --hb-track:    #170a26;  /* sacca scura */
      --hb-dim:      #46206b;
      --hb-critical: #c8ff1e;  /* verde acido: per gli alieni il pericolo e' acido */
      --hb-text:     #f0dcff;
      font-family: 'Michroma', Consolas, 'Courier New', monospace;
    }

    /* --- riempimento pilotabile dal gioco --- */
    #hb-fill-group {
      transform-box: fill-box;
      transform-origin: left center;
      transform: scaleX(1);                 /* 0..1 = HP */
      transition: transform .45s cubic-bezier(.3,.8,.3,1);
    }
    #hb-root.no-ease #hb-fill-group { transition: none; }

    /* --- impulso bioluminescente che scorre nel plasma --- */
    #hb-shimmer {
      animation: hb-pulse-travel 3.4s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes hb-pulse-travel {
      from { transform: translateX(-60px); }
      to   { transform: translateX(580px); }
    }

    /* --- respiro della membrana --- */
    #hb-frame { animation: hb-membrane 3s ease-in-out infinite; }
    @keyframes hb-membrane {
      0%,100% { stroke-opacity: .75; }
      50%     { stroke-opacity: 1; }
    }

    /* --- cellule che fluttuano nel plasma --- */
    #hb-cells { animation: hb-drift 7s linear infinite; opacity: .5; }
    @keyframes hb-drift {
      from { transform: translateX(0); }
      to   { transform: translateX(60px); }
    }

    /* --- stato critico: aggiungere la classe .is-critical a #hb-root --- */
    #hb-warning { opacity: 0; }
    .is-critical #hb-fill      { fill: url(#hb-grad-critical); }
    .is-critical #hb-fill-edge { stroke: var(--hb-critical); }
    .is-critical #hb-frame     { stroke: var(--hb-critical); }
    .is-critical #hb-warning   { opacity: 1; animation: hb-blink .6s steps(2) infinite; }
    .is-critical #hb-fill-group{ animation: hb-spasm .8s ease-in-out infinite; }
    @keyframes hb-blink { 50% { opacity: 0; } }
    @keyframes hb-spasm { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

    @media (prefers-reduced-motion: reduce) {
      #hb-shimmer, #hb-frame, #hb-cells, .is-critical #hb-fill-group { animation: none; }
    }
  </style>

  <defs>
    <!-- gradiente del plasma -->
    <linearGradient id="hb-grad-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--hb-fill-a)"/>
      <stop offset="1" stop-color="var(--hb-fill-b)"/>
    </linearGradient>

    <!-- gradiente per stato critico (acido) -->
    <linearGradient id="hb-grad-critical" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaff7a"/>
      <stop offset="1" stop-color="var(--hb-critical)"/>
    </linearGradient>

    <!-- glow viola -->
    <filter id="hb-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- sagoma organica della barra: membrana ondulata -->
    <path id="hb-bar-shape" d="M112 70
      C112 56 124 49 142 52
      C230 45 300 59 380 52
      C465 46 545 57 596 52
      C608 54 613 61 613 70
      C613 79 608 86 596 88
      C545 93 465 84 380 88
      C300 94 230 81 142 88
      C124 91 112 84 112 70 Z"/>

    <clipPath id="hb-bar-clip">
      <use href="#hb-bar-shape"/>
    </clipPath>
  </defs>

  <!-- ================= SACCA DI FONDO ================= -->
  <use id="hb-track" href="#hb-bar-shape" fill="var(--hb-track)" fill-opacity=".85"/>

  <!-- ================= RIEMPIMENTO (scalare #hb-fill-group) ================= -->
  <g clip-path="url(#hb-bar-clip)">
    <g id="hb-fill-group">
      <rect id="hb-fill" x="104" y="44" width="514" height="52" fill="url(#hb-grad-fill)"/>
      <!-- cellule sospese nel plasma -->
      <g id="hb-cells" fill="#ffffff">
        <circle cx="160" cy="62" r="3"/>
        <circle cx="235" cy="78" r="2"/>
        <circle cx="318" cy="58" r="2.5"/>
        <circle cx="402" cy="76" r="2"/>
        <circle cx="478" cy="60" r="3"/>
        <circle cx="548" cy="74" r="2"/>
      </g>
      <!-- fronte luminoso del riempimento -->
      <line id="hb-fill-edge" x1="611" y1="48" x2="611" y2="92"
            stroke="var(--hb-fill-a)" stroke-width="4" stroke-linecap="round"
            filter="url(#hb-glow)"/>
      <!-- impulso bioluminescente -->
      <g id="hb-shimmer">
        <ellipse cx="120" cy="70" rx="34" ry="22" fill="#ffffff" opacity=".25"/>
      </g>
    </g>

    <!-- ================= COSTOLE CHITINOSE (overlay) ================= -->
    <g id="hb-segments" stroke="#0b0314" stroke-width="3" fill="none" opacity=".9">
      <path d="M158 48 Q148 70 158 92"/>
      <path d="M212 48 Q202 70 212 92"/>
      <path d="M266 48 Q256 70 266 92"/>
      <path d="M320 48 Q310 70 320 92"/>
      <path d="M374 48 Q364 70 374 92"/>
      <path d="M428 48 Q418 70 428 92"/>
      <path d="M482 48 Q472 70 482 92"/>
      <path d="M536 48 Q526 70 536 92"/>
    </g>
  </g>

  <!-- ================= MEMBRANA ESTERNA ================= -->
  <use id="hb-frame" href="#hb-bar-shape" fill="none"
       stroke="var(--hb-primary)" stroke-width="2.5" stroke-linejoin="round"
       filter="url(#hb-glow)"/>
  <!-- seconda membrana interna, sottile -->
  <use id="hb-frame-inner" href="#hb-bar-shape" fill="none"
       stroke="var(--hb-dim)" stroke-width="1" transform="translate(0 0) scale(1)"
       opacity=".6"/>

  <!-- ================= TESTI ================= -->
  <text id="hb-label" x="118" y="40" fill="var(--hb-primary)" font-size="18"
        font-weight="bold" letter-spacing="4" filter="url(#hb-glow)">HP</text>

  <text id="hb-value" x="610" y="40" fill="var(--hb-primary)" font-size="18"
        font-weight="bold" text-anchor="end" letter-spacing="2"
        filter="url(#hb-glow)">100%</text>

  <!-- indicatore stato critico (nascosto di default) -->
  <g id="hb-warning">
    <!-- tre graffi d'artiglio -->
    <g stroke="var(--hb-critical)" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M428 24 L436 40"/>
      <path d="M438 24 L446 40"/>
      <path d="M448 24 L456 40"/>
    </g>
    <text x="464" y="38" fill="var(--hb-critical)" font-size="13"
          letter-spacing="3">LOW</text>
  </g>
</svg>
