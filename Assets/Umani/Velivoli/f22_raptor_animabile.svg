<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Caccia stile F-22, vista dall'alto, muso verso l'alto.
       Compatibile Three.js SVGLoader: fill solidi, niente gradienti/filtri/defs/use.
       Parti animabili su path separati con id. -->

  <!-- BOOST: fiamme dei motori, da accendere/spegnere e far "tremolare" in codice.
       Strato esterno (arancione) + nucleo interno (giallo), per ogni motore. -->
  <path id="boost_sx_esterno" d="M 91 264 L 99 264 L 97 292 L 95 298 L 93 292 Z" fill="#ff6a00"/>
  <path id="boost_sx_interno" d="M 93 264 L 97 264 L 95 284 Z" fill="#ffd24a"/>
  <path id="boost_dx_esterno" d="M 101 264 L 109 264 L 107 292 L 105 298 L 103 292 Z" fill="#ff6a00"/>
  <path id="boost_dx_interno" d="M 103 264 L 107 264 L 105 284 Z" fill="#ffd24a"/>

  <!-- FUSOLIERA: corpo principale con ali a diamante e stabilatori -->
  <path id="fusoliera" d="M 100 6
           L 107 42 L 111 100 L 119 122
           L 187 176 L 181 193 L 127 184
           L 158 224 L 151 240 L 113 230
           L 112 258 L 104 266 L 100 262
           L 96 266 L 88 258 L 87 230
           L 49 240 L 42 224 L 73 184
           L 19 193 L 13 176 L 81 122
           L 89 100 L 93 42 Z"
        fill="#a3a3a3" stroke="#2e2e2e" stroke-width="2" stroke-linejoin="round"/>

  <!-- Derive verticali inclinate -->
  <path id="deriva_dx" d="M 116 188 L 140 206 L 133 238 L 113 224 Z"
        fill="#8a8a8a" stroke="#2e2e2e" stroke-width="1.5" stroke-linejoin="round"/>
  <path id="deriva_sx" d="M 84 188 L 60 206 L 67 238 L 87 224 Z"
        fill="#8a8a8a" stroke="#2e2e2e" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Prese d'aria -->
  <path id="presa_dx" d="M 109 103 L 117 121 L 111 123 L 105 107 Z" fill="#7a7a7a"/>
  <path id="presa_sx" d="M 91 103 L 83 121 L 89 123 L 95 107 Z" fill="#7a7a7a"/>

  <!-- Ugelli motori -->
  <path id="ugello_sx" d="M 91 250 L 99 250 L 98 264 L 92 262 Z" fill="#3a3a3a"/>
  <path id="ugello_dx" d="M 101 250 L 109 250 L 108 262 L 102 264 Z" fill="#3a3a3a"/>

  <!-- Abitacolo -->
  <path id="abitacolo" d="M 100 44 C 106 50 107 72 100 84 C 93 72 94 50 100 44 Z"
        fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1"/>

  <!-- LUCI DI POSIZIONE (convenzione aeronautica):
       rossa su estremità ala sinistra, verde su ala destra, strobo bianco in coda -->
  <circle id="luce_nav_sx" cx="21" cy="184" r="3.5" fill="#ff2a2a"/>
  <circle id="luce_nav_dx" cx="179" cy="184" r="3.5" fill="#2aff5e"/>
  <circle id="luce_strobo_coda" cx="100" cy="258" r="3" fill="#ffffff"/>
</svg>
