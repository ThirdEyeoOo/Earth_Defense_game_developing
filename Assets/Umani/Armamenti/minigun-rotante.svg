<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -44 64 116" width="64" height="116">
  <!-- ed-asset route="dom" name="minigun-rotante" animatable="#canne_rotanti,#vampa" state-class="on" i18n-text="none" -->
  <!-- Modulo arma UMANO montato sugli hardpoint dell'F-22 (vista top-down, muso/volata
       verso l'ALTO = verso il bersaglio). Reso come modulo DOM nel registro armi del gioco
       (src/render/weaponModules.ts), come il plasma-turret: lo stato a riposo è baked negli
       attributi (#vampa opacity 0), il gioco accende `.on` per far girare #canne_rotanti e
       lampeggiare #vampa. SVG a fill solidi (resta mesh-capable). #bocca_1..5 = volate (r=0). -->

